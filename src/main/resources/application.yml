spring:
  application:
    name: subscriptions

  # H2 In-Memory Database
  datasource:
    url: jdbc:h2:mem:subscriptionsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Virtual Threads (Spring Boot 3.2+ / Java 21)
  threads:
    virtual:
      enabled: true

# Server
server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# Application Info
info:
  app:
    name: Subscriptions API
    version: "@project.version@"
    description: Flexible subscription management supporting recurring billing

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

# Google Cloud Pub/Sub — overridden per environment (dev uses emulator, prod uses real GCP)
spring:
  cloud:
    gcp:
      pubsub:
        # In production set SPRING_CLOUD_GCP_PROJECT_ID env var instead of hardcoding here.
        # For local dev, point at the Pub/Sub emulator:
        #   gcloud beta emulators pubsub start
        #   export PUBSUB_EMULATOR_HOST=localhost:8085
        emulator-host: ${PUBSUB_EMULATOR_HOST:}

# Billing job configuration
billing:
  pubsub:
    topic: subscription.billing.due
    subscription: subscription.billing.due-sub
    dead-letter-topic: subscription.billing.failed

# Logging
logging:
  level:
    com.sureshkvn.subscriptions: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
