name: Deploy Billing Dispatcher Job

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

  # Allow manual re-deployment (e.g. after infra changes)
  workflow_dispatch:

env:
  PROJECT_ID:  ${{ secrets.GCP_PROJECT_ID }}
  REGION:      us-central1
  REPOSITORY:  subscriptions
  JOB_NAME:    billing-dispatcher

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build, test, and push the Docker image (same jar, different entry profile)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Dispatcher Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw -B verify

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          # Reuse the same application image — the `job` profile is set at runtime via
          # SPRING_PROFILES_ACTIVE so we don't need a separate Dockerfile.
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.JOB_NAME }}:${{ github.sha }}"
          docker build --tag "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

  # ---------------------------------------------------------------------------
  # 2. Update the Cloud Run Job definition with the new image
  # ---------------------------------------------------------------------------
  deploy:
    name: Update Cloud Run Job
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Job image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.JOB_NAME }}:${{ github.sha }}"
          gcloud run jobs update ${{ env.JOB_NAME }} \
            --image="${IMAGE}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}"
          echo "Job updated with image: ${IMAGE}"
